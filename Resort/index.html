<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cabritos Resort</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">Cabritos Resort🏝️🌊</a>
    <nav aria-label="Primary">
      <ul class="menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="info.html">About Cabritos Resort</a></li>
        <li><a href="jul.html">Reservation</a></li>
      </ul>
    </nav>
  </header>

  <main class="hero">
    <video
      class="hero-video"
      autoplay
      muted
      loop
      playsinline
      poster="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1600&q=80"
      aria-label="Aerial view of a tropical beach resort">
      <source src="https://cdn.coverr.co/videos/coverr-relaxing-by-the-sea-5587/1080p.mp4" type="video/mp4">
    </video>
    <div class="hero-shade" aria-hidden="true"></div>

    <section class="login-card" aria-label="Member login">
      <h1>Log In to Cabritos Resort</h1>
      <p>Sign in to view room rates, travel dates, and your itinerary.</p>
      <form action="home.html" class="login-form" id="loginForm" method="GET">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter password" required>

        <button type="submit" >Login</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p><b>Kasoy Incorpartion</b></p>
  </footer>

  <script src="jul.js"></script>
</body>
</html>
