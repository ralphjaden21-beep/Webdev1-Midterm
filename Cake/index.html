<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cabrito's Cakehouse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">
		<img src="zitowscakehouse.png" alt="Cabrito's Cake House" class="logo-img">
		Cabrito's Cakehouse
		</div>
        <div class="nav-links">
            <a href="index.html" class="btn-cream">Home</a>
            <a href="shop.html" class="btn-cream">Shop</a>
            <a href="cart.html" class="btn-cream">Cart (<span id="cart-count">0</span>)</a>
            <a href="login.html" class="btn-cream btn-login">Login</a>
        </div>
    </nav>

    <div id="cart-modal" class="modal-overlay">
        <div class="container" style="max-width: 400px; text-align: center;">
            <h2 id="modal-title">Confirm Selection</h2>
            <p id="modal-msg"></p>
            <div id="qty-box" style="display:none; margin: 20px;">
                <label>Quantity: </label>
                <input type="number" id="item-qty" value="1" min="1" style="width: 60px; padding: 5px;">
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="modal-yes" class="btn-cream" style="flex:1">Yes</button>
                <button id="modal-no" class="btn-cream" style="flex:1; background:rgba(255,255,255,0.2); color:white;">No</button>
            </div>
        </div>
    </div>

    <div class="container">
        <section id="home" class="page active">
            <div class="carousel">
                <img id="carousel-img" class="carousel-img" src="images/Banner.jpeg" alt="Banner Image">
                <div class="carousel-overlay">
				<h1>Cabrito's Cakehouse</h1>
				<p>Taste the delicious handmade cakes</p>
				<a href="shop.html" class="btn-cream">Browse the Shop</a>
			</div>
            </div>
            <h2>Best Seller</h2>
            <div class="grid" id="trending-grid"></div>
        </section>


       
    </div>
    <script src="main.js"></script>
</body>
</html>
