<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shop - Cabrito's Cakehouse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">
		<img src="zitowscakehouse.png" alt="Cabrito's Cakehouse Logo" class="logo-img">
		Cabrito's Cakehouse
		</div>
        <div class="nav-links">
            <a href="index.html" class="btn-cream">Home</a>
            <a href="shop.html" class="btn-cream">Shop</a>
            <a href="cart.html" class="btn-cream">Cart (<span id="cart-count">0</span>)</a>
            <a href="login.html" class="btn-cream btn-login">Login</a>
        </div>
    </nav>

    <div id="cart-modal" class="modal-overlay">
        <div class="container" style="max-width: 400px; text-align: center;">
            <h2 id="modal-title">Confirm Selection</h2>
            <p id="modal-msg"></p>
            <div id="qty-box" style="display:none; margin: 20px;">
                <label>Quantity: </label>
                <input type="number" id="item-qty" value="1" min="1" style="width: 60px; padding: 5px;">
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="modal-yes" class="btn-cream" style="flex:1">Yes</button>
                <button id="modal-no" class="btn-cream" style="flex:1; background:rgba(255,255,255,0.2); color:white;">No</button>
            </div>
        </div>
    </div>

    <div class="container">

        <section id="shop" class="page active">
            <h2 style="margin-bottom: 30px;">Menu</h2>
            
            <!-- Search Bar -->
            <div style="margin-bottom: 2rem;">
                <input type="text" class="search-bar" placeholder="Search cakes by name or category...">
            </div>

            <!-- Category Filter -->
            <div style="margin-bottom: 2rem; display: flex; gap: 1rem; flex-wrap: wrap;">
                <button class="filter-btn active" onclick="filterByCategory('')">All</button>
                <button class="filter-btn" onclick="filterByCategory('Classic')">Classic</button>
                <button class="filter-btn" onclick="filterByCategory('Specialty')">Specialty</button>
                <button class="filter-btn" onclick="filterByCategory('Popular')">Popular</button>
                <button class="filter-btn" onclick="filterByCategory('Custom')">Custom</button>
            </div>

            <!-- Cake Grid -->
            <div class="grid" id="full-grid"></div>
        </section>

    
    </div>
    <script src="main.js"></script>
</body>
</html>
