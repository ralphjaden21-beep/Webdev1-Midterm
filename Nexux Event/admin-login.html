<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Events | Admin Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="admin">
  <header class="site-header">
    <div class="container navbar">
      <a class="brand" href="index.html"><img src="Logo.png" alt="Nexus Events Logo"></a>
      <nav class="nav-links">
        <a href="index.html" data-nav="home">Home</a>
        <a href="events.html" data-nav="events">Events</a>
        <a href="tickets.html" data-nav="tickets">Tickets</a>
        <a href="venue.html" data-nav="venue">Venue</a>
        <a href="contact.html" data-nav="contact">Contact</a>
        <a href="admin-login.html" data-nav="admin">Admin</a>
      </nav>
      <button class="btn btn--ghost" type="button" data-dark-toggle>Dark Mode: OFF</button>
    </div>
  </header>

  <main class="container">
    <section class="hero admin-hero">
      <div>
        <h1>Admin Control Room</h1>
        <p>Authorized team only. Log in to manage events, ticket tiers, venue schedules, and guest communications.</p>
        <div class="tag-row">
          <span class="tag">Events</span>
          <span class="tag">Tickets</span>
          <span class="tag">Venue Ops</span>
          <span class="tag">Inbox</span>
        </div>
      </div>
      <div class="panel auth-card admin-login-card">
        <h2 style="margin-top:0;">Admin Login</h2>
        <p class="form-note">Demo access: <strong>admin</strong> / <strong>nexus2026</strong></p>
        <form class="form-grid" data-admin-form>
          <label>
            Admin ID
            <input type="text" placeholder="𝓣𝔂𝓹𝓮 𝓼𝓸𝓶𝓮𝓽𝓱𝓲𝓷𝓰 𝓽𝓸 𝓼𝓽𝓪𝓻𝓽" required autocomplete="username" data-admin-user>
          </label>
          <label>
            Password
            <input type="password" placeholder="••••••••" required autocomplete="current-password" data-admin-pass>
          </label>
          <button class="btn btn--big" type="submit">Enter Dashboard</button>
          <p class="status" data-admin-status></p>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <p class="pill">Nexus Events · Admin Access</p>
      <p>Credits to Kasoy 1967</p>
    </div>
  </footer>

  <script src="app.js" defer></script>
  <script src="admin.js" defer></script>
</body>
</html>
