<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Cabrito's Cake House</title>
    <link rel="stylesheet" href="general.css">
</head>
<body data-required-role="user">

    <nav>
        <div class="logo">
            <img src="Logo.jpeg" alt="Cabrito's Cake House logo">
            <span>Cabrito's Cake House</span>
        </div>
        <div class="nav-links">
            <a href="User.html">Dashboard</a>
            <a href="Shop.html">Order</a>
            <a href="PurchaseHistory.html">Purchase History</a>
            <a href="#" class="logout-btn">Log out</a>
        </div>
    </nav>

    <main class="form-page">
        <section class="form-card">
            <p class="shop-kicker">Profile management</p>
            <h1>Customer Profile</h1>
            <p class="form-message" id="profile-message" aria-live="polite"></p>

            <form id="profile-form" class="detail-form">
                <label>
                    Full name
                    <input type="text" name="name" required>
                </label>
                <label>
                    Phone number
                    <input type="tel" name="phone" required>
                </label>
                <label>
                    Email
                    <input type="email" name="email" required>
                </label>
                <label>
                    Address
                    <textarea name="address" rows="3" required></textarea>
                </label>
                <label>
                    City / Province
                    <input type="text" name="city" required>
                </label>
                <label>
                    Delivery note
                    <textarea name="note" rows="3"></textarea>
                </label>
                <button type="submit">Save Profile</button>
            </form>
        </section>
    </main>

    <script src="access.js"></script>
    <script src="auth.js"></script>
    <script src="logout.js"></script>
    <script src="profile.js"></script>
</body>
</html>
